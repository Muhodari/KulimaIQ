# KulimaIQ backend — Render Blueprint
# Dashboard: New → Blueprint → connect this repo
# Set secret env vars in Render after deploy (MONGO_URL, SECRET_KEY).

services:
  - type: web
    name: kulimaiq-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MONGO_DB
        value: kulimaiq
      - key: MODEL_WEIGHTS_PATH
        value: model_weights/kulimaiq_mobilenet.pth
      - key: ML_CONFIDENCE_THRESHOLD
        value: "0.50"
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      # REQUIRED — set in Render dashboard (Environment tab), not in git:
      # MONGO_URL = mongodb+srv://...@cluster0....mongodb.net/kulimaiq?retryWrites=true&w=majority
      # SECRET_KEY = long random string from backend/.env
      - key: MONGO_URL
        sync: false
      - key: SECRET_KEY
        sync: false
