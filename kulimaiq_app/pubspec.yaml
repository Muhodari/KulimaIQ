name: kulimaiq_app
description: "ML-powered agricultural intelligence for smallholder farmers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0
  crypto: ^3.0.6
  permission_handler: ^11.3.1
  device_info_plus: ^11.2.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#1B7A3A"
  adaptive_icon_foreground: assets/icon/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
